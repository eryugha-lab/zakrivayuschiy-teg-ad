<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Закрывающий тег</title>

    <!-- favicon -->
    <link rel="icon" href="./images/favicon.ico" sizes="any" />
    <link rel="icon" href="./images/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./images/apple-touch-icon.png" />

    <!-- styles -->
    <link rel="stylesheet" href="./fonts/fonts.css" />
    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/globals.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/animations.css" />
  </head>
  <body class="page">
    <!-- SVG Symbols -->
    <svg aria-hidden="true" style="position: absolute; width: 0; height: 0">
      <symbol id="floppy" viewBox="0 0 24 24">
        <path fill="currentColor" d="M4 2h12v4h4v16H4V2zm2 2v16h12V8h-4V4H6z" />
      </symbol>
    </svg>

    <!-- Header -->
    <header class="header page__section page__section_width_narrow">
      <div class="header__logo">&lt;/&gt;</div>
      <h1 class="header__title">Закрывающий тег</h1>
      <p class="header__subtitle">
        Проект о пути в вёрстке и о том, как ты его проходишь.
      </p>
    </header>

    <!-- Main Content -->
    <main class="content">
      <section class="cards page__section page__section_width_wide" aria-label="Карточки">
        <!-- Card 1 -->
        <article class="card">
          <div class="card__image-wrapper">
            <span class="card__label">Этап 1</span>
            <img
              class="card__image card__image_filter_1"
              src="./images/card-1.jpg"
              alt="Картинка этапа 1"
              loading="lazy"
            />
          </div>
          <div class="card__content">
            <h2 class="card__title">Начало</h2>
            <p class="card__text">Личный текст о этапе 1.</p>
            <div class="card__buttons">
              <button class="card__icon-button" aria-label="Лайк">
                <svg class="like-icon" viewBox="0 0 39 36" aria-hidden="true">
                  <g class="heart">
                    <path class="core" fill="none" d="M12 19H4l8-13h9v7h8l-8 13h-9v-7z" />
                    <path class="main-body" fill="none" d="M12 19H4l8-13h9v7h8l-8 13h-9v-7z" />
                    <path class="contour" fill="var(--contour-color)" d="M12 19H4l8-13h9v7h8l-8 13h-9v-7z" />
                  </g>
                  <path class="sparks" fill="var(--animation-fill-color)" d="M12 2l1 3h3l-2 2 1 3-2-2-2 2 1-3-2-2h3zm13 0l1 3h3l-2 2 1 3-2-2-2 2 1-3-2-2h3z" />
                </svg>
              </button>
              <button class="button card__like-button">
                <span class="button__text">Like</span>
              </button>
              <button class="button card__save-button" data-dialog-open>
                <svg class="button__icon" width="21" height="21" aria-hidden="true">
                  <use href="#floppy"></use>
                </svg>
                <span class="button__text">Сохранить на память</span>
              </button>
            </div>
          </div>
        </article>

        <!-- Card 2-8 (duplicate with different content) -->
        <article class="card">
          <div class="card__image-wrapper">
            <span class="card__label">Прогресс</span>
            <img class="card__image card__image_filter_2" src="./images/card-2.jpg" alt="Card 2" loading="lazy" />
          </div>
          <div class="card__content">
            <h2 class="card__title">Набир опыта</h2>
            <p class="card__text">Личный текст о этапе 2.</p>
            <div class="card__buttons">
              <button class="card__icon-button" aria-label="Лайк">
                <svg class="like-icon" viewBox="0 0 39 36" aria-hidden="true">
                  <g class="heart"><path class="core" fill="none" d="M12 19H4l8-13h9v7h8l-8 13h-9v-7z" /><path class="main-body" fill="none" d="M12 19H4l8-13h9v7h8l-8 13h-9v-7z" /><path class="contour" fill="var(--contour-color)" d="M12 19H4l8-13h9v7h8l-8 13h-9v-7z" /></g>
                  <path class="sparks" fill="var(--animation-fill-color)" d="M12 2l1 3h3l-2 2 1 3-2-2-2 2 1-3-2-2h3zm13 0l1 3h3l-2 2 1 3-2-2-2 2 1-3-2-2h3z" />
                </svg>
              </button>
              <button class="button card__like-button"><span class="button__text">Like</span></button>
              <button class="button card__save-button" data-dialog-open><svg class="button__icon" width="21" height="21" aria-hidden="true"><use href="#floppy"></use></svg><span class="button__text">Сохранить на память</span></button>
            </div>
          </div>
        </article>
      </section>
    </main>

    <!-- Modal Dialog -->
    <dialog class="modal">
      <form class="modal__container" method="dialog">
        <div class="modal__icon">
          <svg width="39" height="39" aria-hidden="true">
            <use href="#floppy"></use>
          </svg>
        </div>
        <div class="modal__content">
          <p class="modal__text">Сохранить карточку на память?</p>
          <button class="button modal__button" type="submit"><span class="button__text">ОК</span></button>
        </div>
      </form>
    </dialog>

    <!-- Footer -->
    <footer class="footer page__section page__section_width_narrow"></footer>

    <!-- Scripts -->
    <script src="./scripts/like.js"></script>
  </body>
</html>
